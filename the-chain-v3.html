<script>
const{useState,useEffect,createElement:h}=React;

// ═══════════════════════════════════════════════════
//  NARRATIVE — enhanced for postgraduate audience
// ═══════════════════════════════════════════════════
const NARRATIVE=[
  {h:'A medicine reaches a patient. Nothing about that is simple.',
   p:'The tablet in a patient\'s hand has crossed 12 countries, 40 companies, and 6 months of lead time. The global pharmaceutical supply chain is the most critical logistics infrastructure humanity has ever built — and one of the most fragile. A single contamination event in one factory can leave hospitals on five continents short of a medicine they cannot substitute. This simulation places you at the centre of that system.',
   hl:null,concept:null},
  {h:'Upstream: the geopolitics of raw materials',
   p:'Roughly 80% of active pharmaceutical ingredients (APIs) consumed in Western markets originate in India and China — the product of three decades of globalisation and cost optimisation. This concentration creates structural exposure at enormous scale. When a regulatory hold is placed on a single solvent plant in Gujarat, the disruption moves invisibly through the chain, surfacing weeks later as a ward-level shortage that no amount of agile logistics can immediately reverse.',
   hl:0,concept:'→  Material flow originates here. Every downstream node depends on this upstream point.'},
  {h:'Manufacture: validated, slow, expensive — and irreplaceable',
   p:'Pharmaceutical manufacturing is not like other manufacturing. Every process must be regulatory-validated before a single batch can be sold. Changing a supplier, a machine, or a production parameter can require months of requalification. Lead times of 6–18 months are normal for complex drug substances. This rigidity — engineered for quality assurance — is also what makes pharmaceutical supply chains profoundly brittle in the face of disruption. There is no fast path around it.',
   hl:1,concept:'→  Long lead times mean shortages are slow to form and slow to resolve. The chain has no short circuit.'},
  {h:'Quality and compliance: a non-negotiable operating condition',
   p:'Before a medicine crosses any border, it must satisfy the regulatory standards of every market it enters — the EMA, MHRA, FDA, and dozens of national equivalents operating independently. A manufacturing deviation in Brindisi can trigger a market withdrawal under rules written in Brussels. A failed stability study can halt five product lines simultaneously. Compliance is not a gate at the end of the process. It is a condition running through every step, with no tolerance for shortcut.',
   hl:2,concept:'↔  Information flow: quality data, deviation reports, inspection findings, and regulatory signals move in both directions simultaneously.'},
  {h:'Distribution: the last kilometre of a very long chain',
   p:'From manufacturing site to patient bedside, pharmaceutical products move through wholesalers, third-party logistics providers, cold chain operators, hospital pharmacies, and community dispensers — each a potential point of failure. Temperature excursions during transit can render an entire shipment of biologics unusable. Allocation disputes between competing customer segments create shortages that policy alone cannot resolve. And at the end of this chain, a patient is waiting.',
   hl:3,concept:'←  Financial flow: payments, credit terms, and contractual obligations travel upstream as goods move down.'},
  {h:'Three flows. One discipline. Zero margin for error.',
   p:'Material flow. Information flow. Financial flow. These three currents run simultaneously through every pharmaceutical supply chain. Supply chain management is the discipline of keeping them aligned — under geopolitical pressure, under regulatory scrutiny, under commercial constraint, and under the daily reality that a patient\'s clinical outcome may depend on a decision you will make in the next five minutes. You are the Supply Chain Director at Meridian Pharma. Your first week starts now.',
   hl:'all',concept:null},
];

// ═══════════════════════════════════════════════════
//  GAME DATA
// ═══════════════════════════════════════════════════
const ROUNDS=[
  {week:1,tag:'API SUPPLIER FAILURE',
   situation:'Your primary API supplier in Gujarat — responsible for 68% of your ciprofloxacin precursor — has suspended production following a solvent contamination event. The Indian regulatory authority has issued a manufacturing hold with no confirmed end date. Your current warehouse stock represents 17 days of demand at normal run rate. Three NHS hospital trusts have standing orders due in 11 days, totalling 840,000 units. Your secondary supplier in Hyderabad has capacity but is not yet fully qualified under your quality system.',
   stakes:'If supply is not secured within two weeks, hospitals will face critical shortages of a first-line antibiotic used in post-surgical infection prophylaxis.',
   choices:[
    {id:'A',label:'Emergency secondary supplier activation',description:'Qualify and onboard your Hyderabad supplier on an expedited basis — fast-tracking a quality audit and paying a 40% unit cost premium. Lead time: 9 days.',tradeoff:'Significant short-term cost increase and quality risk from an under-audited supplier.',tag:'RESILIENCE',consequence:'The Hyderabad supplier delivers to spec. Hospitals receive their orders with 2 days to spare. Your cost of goods rises by £380k for the quarter, but continuity is preserved. The fast-track audit flags two minor deviations — manageable now, but a reminder of the risk you absorbed. Your procurement team begins dual-sourcing reviews across six other APIs.',deltas:{inventory:12,resilience:14,demand:-8,reputation:12},concept:{term:'Dual sourcing and supply resilience',note:'Over-reliance on a single upstream supplier is a classic single-point-of-failure risk. Dual sourcing distributes that risk at a cost premium — a direct expression of the lean vs resilient trade-off in pharmaceutical supply chains.'}},
    {id:'B',label:'Demand triage and rationing protocol',description:'Work with hospital procurement teams to prioritise patients most at clinical risk. Extend existing stock across 24 days through strict allocation controls while properly qualifying the Hyderabad supplier.',tradeoff:'Hospitals will experience partial supply and elevated administrative burden; some relationships strained.',tag:'PATIENT_FIRST',consequence:'The allocation protocol holds. No patient goes untreated, but two hospital procurement managers escalate formally to your commercial team. One trust begins a competitive tender process. The Hyderabad supplier is qualified properly — 14 days — and supply is restored. Reputation takes a short-term dip, but your quality record remains intact.',deltas:{inventory:4,resilience:8,demand:6,reputation:-8},concept:{term:'Safety stock and service-level trade-offs',note:'Safety stock buffers against supply variability but carries cost. Insufficient buffer inventory forces active triage — shifting the burden of supply risk onto clinical teams downstream.'}},
    {id:'C',label:'Spot-market procurement — immediate',description:'Purchase available stock from a spot-market broker in Singapore. Certified material, but a shorter provenance chain than your standard. Price: 75% premium. Delivery: 6 days.',tradeoff:'Provenance and chain-of-custody risks; potential regulatory scrutiny.',tag:'COST_DRIVEN',consequence:'Supply arrives and the crisis appears resolved. But a routine EMA audit three weeks later flags the abbreviated provenance documentation. A formal inquiry is issued. Legal and compliance costs run to £220k over the following quarter — more than you saved by not qualifying a secondary supplier. A cautionary note enters your regulatory file.',deltas:{inventory:18,resilience:-10,demand:-6,reputation:-14},concept:{term:'Total cost of ownership (TCO)',note:'The spot-market decision optimised for purchase price but ignored regulatory, compliance, and reputational costs. TCO requires accounting for all downstream costs of a sourcing decision, not just the unit price.'}},
   ]},
  {week:2,tag:'DEMAND SURGE',
   situation:'A regional respiratory outbreak — initially assessed as seasonal — has been reclassified by Public Health England as a potential epidemic event. Hospital demand for your broad-spectrum antibiotic has risen to 280% of forecasted volume in 72 hours. Your distribution network is operating at 94% capacity. Three wholesale distributors have lodged emergency orders simultaneously, and each is ordering significantly more than their actual need — a precautionary response to anticipated shortage. Your current inventory covers approximately 9 days at this run rate.',
   stakes:'Failure to allocate efficiently risks both clinical harm and the reputational damage of being seen to prioritise commercial customers over patient need.',
   choices:[
    {id:'A',label:'Activate outbreak allocation protocol',description:'Implement the pre-defined outbreak response procedure: freeze commercial orders, allocate 100% of available stock to NHS clinical settings by patient-acuity scoring, and notify the DHSC.',tradeoff:'Commercial revenues fall significantly for 2–3 weeks; some wholesale relationships damaged.',tag:'PATIENT_FIRST',consequence:'The protocol works as designed. PHE formally commends Meridian\'s response. Two wholesale accounts suspend orders and one files a breach-of-contract notice — a legal cost you expected. NHS trust relationships strengthen significantly. When the outbreak subsides, three new NHS frameworks are offered to Meridian, outweighing the commercial losses.',deltas:{inventory:-12,resilience:6,demand:-14,reputation:20},concept:{term:'Objectives of SCM — patient safety vs commercial efficiency',note:'In pharmaceutical SCM, the primary objective is not profit maximisation but continuity of patient care. The objectives of SCM are plural and sometimes in direct tension; this decision forces an explicit choice between them.'}},
    {id:'B',label:'Emergency production uplift',description:'Commission an emergency production run with your manufacturing partner. Lead time: 8 days. Cost: £480k in expediting fees. Distribute remaining stock proportionally in the interim.',tradeoff:'Significant cost and 8-day lag; does not resolve the allocation question in the short term.',tag:'EFFICIENCY',consequence:'The production uplift arrives on day 9. In the interim, pro-rata allocation across all customers is imperfect but defensible. No clinical shortages are confirmed, though three hospitals report critically low levels for 48 hours. The expediting cost hits the P&L hard but operations stabilise.',deltas:{inventory:8,resilience:4,demand:-4,reputation:2},concept:{term:'The bullwhip effect',note:'The demand spike at patient level has been amplified upstream — wholesalers are ordering far more than they need as a precaution, creating wildly distorted demand signals at the manufacturer. This is a textbook bullwhip scenario driven by information asymmetry and panic ordering.'}},
    {id:'C',label:'First-come first-served — standard terms',description:'Fulfil orders in the sequence received under normal commercial terms until stock is exhausted. Communicate transparently about the shortage.',tradeoff:'Lower-acuity commercial customers may receive stock before critical NHS settings.',tag:'COST_DRIVEN',consequence:'Stock is exhausted within 6 days. A private hospital chain and two retail pharmacy groups receive full orders. Two NHS ICUs report critical shortages and escalate to the DHSC. A Freedom of Information request later reveals Meridian\'s allocation sequence. The resulting press coverage triggers a formal parliamentary question and a reputational crisis that takes 18 months to recover from.',deltas:{inventory:-20,resilience:-8,demand:18,reputation:-28},concept:{term:'Supply chain complexity — competing stakeholder flows',note:'This outcome illustrates how complex stakeholder networks make SCM decisions genuinely difficult. Material, financial, and information flows each pull in different directions, and prioritising one dimension creates consequences across all others.'}},
   ]},
  {week:3,tag:'REGULATORY DEVIATION',
   situation:'An EMA GMP inspector conducting a routine audit at your primary manufacturing site in Brindisi has flagged a process deviation: temperature excursions in the granulation stage occurring intermittently over 6 weeks. Batch records for 14 production runs are under review. These batches — totalling 2.1 million units — are currently in your distribution network and have reached hospital pharmacies across four countries. A voluntary recall would require notifying the MHRA and issuing a Direct Healthcare Professional Communication within 72 hours.',
   stakes:'If any compromised product reaches patients at scale, the clinical, legal, and regulatory consequences could be existential for Meridian.',
   choices:[
    {id:'A',label:'Voluntary immediate recall — full scope',description:'Initiate a voluntary recall of all 14 batch runs without waiting for regulatory instruction. Notify the MHRA, issue a DHPC, and quarantine all stock across the network.',tradeoff:'£3.2m write-off, significant supply disruption, and short-term reputational damage.',tag:'RESILIENCE',consequence:'The recall is painful: £3.2m written off and supply to 40 NHS trusts disrupted for 11 days. The MHRA formally recognises Meridian\'s proactive approach. The subsequent investigation finds only 2 of 14 batches show degradation outside specification — but you could not have known that at the time. Your compliance record is strengthened and insurers maintain coverage terms.',deltas:{inventory:-24,resilience:16,demand:8,reputation:14},concept:{term:'Quality as a supply chain objective',note:'Voluntary recall demonstrates that quality assurance is a supply chain management responsibility, not solely a manufacturing one. The cost of action is real but bounded; the cost of inaction is not.'}},
    {id:'B',label:'Quarantine and targeted investigation',description:'Immediately quarantine all 14 batches in the network, pending a targeted quality investigation. Notify the MHRA of a precautionary hold but do not yet issue a public recall.',tradeoff:'Days of uncertainty; distribution disruption without the immediate clarity of a formal recall.',tag:'EFFICIENCY',consequence:'The investigation takes 6 days. 2 batches are confirmed out-of-spec and destroyed. The remaining 12 are released with updated documentation. The MHRA accepts the approach. Supply disruption is shorter than a full recall, and the targeted action is praised in the inspection report.',deltas:{inventory:-10,resilience:10,demand:6,reputation:8},concept:{term:'Information flow in supply chain risk management',note:'The quarantine approach delays the material flow decision until better information is available — a rational risk management strategy that creates its own downstream pressures.'}},
    {id:'C',label:'Continue distribution — accelerated lab testing',description:'Allow distribution to continue while commissioning expedited laboratory re-testing of the flagged batches. If results come back clean within 72 hours, no disruption occurs.',tradeoff:'Products of uncertain quality continue to reach patients during the testing window.',tag:'COST_DRIVEN',consequence:'Lab results return on day 3. Two batches show degradation outside specification — and both have been dispensed. The MHRA issues a mandatory recall. Because distribution continued, the traceability operation is far more complex and costly. A patient safety incident is reported in one trust. The regulatory response: a manufacturing licence review is initiated.',deltas:{inventory:2,resilience:-22,demand:6,reputation:-26},concept:{term:'The precautionary principle in SCM',note:'Supply chain managers in regulated industries must understand when the expected cost of action is lower than the expected cost of inaction — even under uncertainty. Continuing distribution optimised for short-term continuity at the expense of patient safety.'}},
   ]},
  {week:4,tag:'COLD CHAIN FAILURE',
   situation:'A sustained heatwave has caused HVAC failure at your primary UK distribution hub in Lutterworth. Temperature excursions above 8°C have been logged across two cold-room bays for 11 hours overnight. The affected stock includes £1.8m of biological medicines — insulin analogues and a monoclonal antibody — destined for 22 hospital trusts and 4 specialist oncology centres. Your biologics are temperature-sensitive: even brief excursions above the cold chain threshold can reduce efficacy or alter safety profiles. Replacement stock from your Belgian site would take 14 days.',
   stakes:'Biological medicines outside temperature range may be ineffective or harmful; patients on insulin and mAb therapies cannot safely interrupt treatment.',
   choices:[
    {id:'A',label:'Full quarantine and urgent patient notification',description:'Quarantine all potentially affected stock immediately. Work with NHS pharmacy teams to identify all patients on affected lines and arrange bridging supply from alternative sources including hospital stockpiles and EU imports.',tradeoff:'Complex, costly patient-level coordination; some patients will face supply gaps during bridging.',tag:'PATIENT_FIRST',consequence:'38 hospital pharmacists are contacted within 4 hours and 94 high-risk patients identified. The NHS Blood and Transplant service assists with emergency insulin allocation. All patients are maintained on therapy without clinical incident. The operation costs £420k in emergency logistics. Meridian\'s response is cited as best practice in a subsequent MHRA cold chain guidance update.',deltas:{inventory:-14,resilience:12,demand:2,reputation:16},concept:{term:'Cold chain integrity as SCM responsibility',note:'Temperature excursion events test whether supply chain infrastructure is treated as a quality function, not just a logistics one. The cost of a robust response is real but quantifiable; the cost of a compromised patient outcome is not.'}},
    {id:'B',label:'Selective quarantine by excursion severity',description:'Use temperature logger data to identify which bays experienced the most severe excursions. Quarantine only those pallets; release the remainder that experienced marginal excursion.',tradeoff:'Risk that marginal-excursion products are not as stable as assumed; quality assessment is probabilistic.',tag:'EFFICIENCY',consequence:'You release 60% of the stock based on logged data. A retrospective study 3 months later identifies a statistically significant reduction in efficacy for one mAb batch — below the excursion threshold you applied. No serious harm is confirmed, but the incident enters Meridian\'s pharmacovigilance record and is reviewed in an internal post-incident report.',deltas:{inventory:-4,resilience:2,demand:0,reputation:-6},concept:{term:'Risk quantification under uncertainty',note:'Supply chain managers routinely make decisions under partial information. This scenario shows how probabilistic risk assessments can fail when the underlying model does not capture full biological variability.'}},
    {id:'C',label:'Release with enhanced pharmacovigilance',description:'Release all stock with an enhanced pharmacovigilance monitoring flag, instructing hospital pharmacists to report adverse events or efficacy concerns with unusual urgency over the following 4 weeks.',tradeoff:'Potentially compromised product is actively administered to patients; monitoring is reactive, not preventive.',tag:'COST_DRIVEN',consequence:'Three adverse events are reported over the following month, two attributed to suspected product instability in a Yellow Card analysis. The MHRA opens an investigation. Enhanced pharmacovigilance does not prevent harm — it documents it. The regulatory outcome includes a temporary distribution suspension for Meridian\'s biologics portfolio, costing £2.1m in lost revenues.',deltas:{inventory:8,resilience:-18,demand:4,reputation:-22},concept:{term:'Proactive vs reactive supply chain management',note:'Reactive monitoring assumes harm must occur before corrective action is taken. Proactive SCM builds in preventive controls that absorb cost before harm reaches patients — one of the central complexities of pharmaceutical supply chain management.'}},
   ]},
  {week:5,tag:'GLOBAL SHORTAGE — ALLOCATION CRISIS',
   situation:'Geopolitical disruption to Chinese chemical exports has caused a global API shortage, leaving Meridian with 35% of its normal finished goods inventory for a critical oncology support medicine. Demand has not decreased. Four customer segments are competing for available supply: NHS oncology centres (life-critical use), private hospitals (elective procedures), community pharmacies (chronic patients), and overseas markets under an existing export contract worth £2.4m annually. You have stock to fulfil approximately 55% of total outstanding orders. Every allocation decision will harm someone.',
   stakes:'This is a multi-stakeholder allocation crisis with direct patient safety implications and significant commercial and contractual dimensions.',
   choices:[
    {id:'A',label:'Clinical acuity framework — NHS priority',description:'Allocate available stock using a transparent clinical acuity scoring system. NHS oncology centres receive first priority. Community pharmacies second. Private and export markets receive remaining stock proportionally.',tradeoff:'Export contract breach; private hospital relationship damage; contractual penalties of £340k.',tag:'PATIENT_FIRST',consequence:'The oncology centres and community pharmacies receive priority supply. The export contract is breached and a £340k penalty triggered. The private hospital group suspends its preferred-supplier agreement. However, the allocation framework is reviewed by the DHSC and adopted as a model for future shortage guidance — and three years later becomes the basis of a national medicines allocation framework.',deltas:{inventory:-8,resilience:8,demand:-6,reputation:16},concept:{term:'SCM objectives — efficiency, responsiveness, and equity',note:'This decision captures the tension between three core objectives of supply chain management. Efficiency favours the export contract; responsiveness favours the NHS; equity favours the clinical framework. Sophisticated SCM requires these objectives to be explicitly prioritised, not treated as naturally aligned.'}},
    {id:'B',label:'Pro-rata allocation across all customers',description:'Distribute available stock proportionally across all four customer segments, based on their share of outstanding orders. No segment is fully fulfilled; no segment is excluded.',tradeoff:'No customer is satisfied; clinical settings may receive insufficient supply alongside lower-acuity settings.',tag:'EFFICIENCY',consequence:'The pro-rata distribution is administratively clean but clinically imperfect. Two NHS oncology centres report allocations below the minimum required for patient continuity. One centre delays three patient treatment cycles. The commercially neutral approach avoids contractual penalties but attracts criticism from clinical directors. A parliamentary briefing notes that Meridian "treated commercial and clinical customers as equivalent."',deltas:{inventory:-6,resilience:4,demand:-2,reputation:-10},concept:{term:'Complexity of SCM — when neutrality is itself a choice',note:'A neutral distribution rule appears simple but conceals complexity. Treating clinical need and commercial obligation as equivalent is itself a value judgement — one with consequences across all three supply chain flows.'}},
    {id:'C',label:'Honour export contract — protect commercial position',description:'Fulfil the export contract in full first as a legal obligation, then distribute remaining domestic stock on a first-come first-served basis.',tradeoff:'NHS oncology centres compete with private and community customers on equal footing with reduced overall stock.',tag:'COST_DRIVEN',consequence:'The export contract is honoured. Community pharmacies and private hospitals — who place orders earlier in the day — receive the bulk of remaining domestic stock. Two NHS oncology centres receive critically low allocations. A formal incident report is filed. The press run the story: "Cancer drug exports prioritised over NHS patients." The reputational damage takes two years to fully repair.',deltas:{inventory:2,resilience:-12,demand:10,reputation:-24},concept:{term:'Financial flow vs material flow — when they conflict',note:'Honouring a financial obligation directed material flow away from the highest-need clinical settings. This illustrates how the three supply chain flows can pull in contradictory directions — and why SCM requires explicit prioritisation frameworks, not just contract management.'}},
   ]},
];

const ARCHETYPES={
  PATIENT_FIRST:{archetype:'The Patient Advocate',summary:'Your decisions consistently prioritised patient safety and clinical continuity — even when that meant absorbing significant costs, straining commercial relationships, or accepting short-term reputational damage. You treated the patient, not the P&L, as the primary supply chain objective.',strengths:['Strong alignment with pharmaceutical SCM\'s core purpose — ensuring medicines reach patients','Clear ethical decision-making framework, consistently applied under pressure','Understanding that long-term institutional reputation is built through patient-first decisions'],blindspots:['Commercial and financial sustainability — the chain must be funded to remain viable','Contractual complexity — patient-first decisions still carry legal and financial risk that must be managed'],reflection:'You consistently prioritised patient outcomes. But sustainable supply chains also require financial viability. How would you build a system that embeds patient-first decision-making as a standing policy — rather than requiring a fresh financial sacrifice each time a crisis occurs?'},
  RESILIENCE:{archetype:'The Systems Thinker',summary:'You focused on protecting the structural integrity of the supply chain, investing in resilience even at short-term cost. Your decisions reflected an understanding that individual disruptions are symptoms — and that the system requires redundancy, dual sourcing, and long-term stability to function at all.',strengths:['Strong grasp of upstream vulnerability and the systemic value of redundancy','Willingness to invest in long-term chain resilience over short-term cost savings','Ability to think across the full supply chain, not just the immediate crisis at hand'],blindspots:['Resilience-focused decisions can be expensive and slow — clinical urgency sometimes demands faster, imperfect action','Patient-level impact can be underweighted when thinking primarily in structural terms'],reflection:'Resilience requires investment before the crisis, not during it. Looking back at your five decisions: which ones could only have been made earlier — at the design stage of the supply chain — rather than in the moment of disruption?'},
  COST_DRIVEN:{archetype:'The Cost Controller',summary:'Your decisions frequently prioritised financial efficiency and commercial continuity. You avoided cost, protected contracts, and kept the chain moving — but this approach generated downstream quality, regulatory, and reputational consequences that were more costly in aggregate than the expenses you avoided.',strengths:['Clear awareness of the financial dimension of supply chain decisions','Ability to identify and evaluate short-term cost trade-offs under pressure'],blindspots:['Total cost of ownership — downstream regulatory, legal, and reputational costs were systematically underweighted','Patient safety and compliance risk do not resolve themselves; they compound when deferred'],reflection:'Each of your decisions had a lower immediate cost and a higher eventual cost. What decision-making framework might have helped you identify, in the moment of each crisis, when the "efficient" choice was not actually the cheapest one?'},
  EFFICIENCY:{archetype:'The Pragmatist',summary:'Your approach was operationally grounded — you sought workable solutions that balanced competing pressures without committing to extreme positions. Generally effective, but middle-of-the-road decisions occasionally left value on the table in both directions: missing opportunities to build resilience, and not fully protecting patients when it mattered most.',strengths:['Practical, operationally literate decision-making','Ability to navigate competing pressures without paralysis','Consistent, explainable decisions that avoid dramatic swings in either direction'],blindspots:['Moderate responses to severe situations can produce moderate outcomes — sometimes the correct decision is asymmetric','Efficiency as a goal can mask the need to explicitly prioritise between clinical, commercial, and regulatory objectives'],reflection:'Supply chain management requires explicit trade-offs, not the balancing-away of competing pressures. Were there moments in the simulation where a clearer prioritisation — even an uncomfortable one — would have produced a better outcome for everyone?'},
};

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
const clamp=v=>Math.max(0,Math.min(100,Math.round(v)));
const INITIAL={inventory:72,resilience:68,demand:52,reputation:80};
const MLABELS={inventory:'Inventory',resilience:'Chain Resilience',demand:'Demand Pressure',reputation:'Reputation'};

const deriveProfile=(history,metrics)=>{
  const counts={PATIENT_FIRST:0,RESILIENCE:0,COST_DRIVEN:0,EFFICIENCY:0};
  history.forEach(d=>{if(counts[d.tag]!=null)counts[d.tag]++;});
  const dominant=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
  return{...ARCHETYPES[dominant],counts,concepts:history.map(d=>d.concept).filter(Boolean)};
};

// ═══════════════════════════════════════════════════
//  SVG DIAGRAMS (one per round)
// ═══════════════════════════════════════════════════

// Round 1: Supply chain with supplier flagged + inventory gauge
function Diag1(){
  const nodes=[{x:48,lbl:'Gujarat\nSupplier',flag:true},{x:160,lbl:'Manufacture'},{x:270,lbl:'QC / Reg.'},{x:378,lbl:'NHS Trusts'}];
  return h('svg',{viewBox:'0 0 560 158',width:'100%',style:{display:'block',overflow:'visible'}},
    // connections
    nodes.slice(0,-1).map((_,i)=>h('line',{key:i,x1:nodes[i].x+28,y1:46,x2:nodes[i+1].x-28,y2:46,stroke:i===0?'#fa4d56':'#3d3d3d',strokeWidth:1.5,strokeDasharray:i===0?'5 3':'none'})),
    // nodes
    nodes.map((n,i)=>h('g',{key:i,transform:`translate(${n.x},20)`},
      h('circle',{cx:0,cy:26,r:24,fill:n.flag?'rgba(218,30,40,.18)':'#262626',stroke:n.flag?'#fa4d56':'#3d3d3d',strokeWidth:n.flag?2:1}),
      h('text',{x:0,y:20,textAnchor:'middle',fontSize:18},n.flag?'⚠':'🏭'),
      n.flag&&h('text',{x:0,y:70,textAnchor:'middle',fontSize:9,fill:'#fa4d56',fontFamily:'IBM Plex Mono,monospace',fontWeight:500},'MFG HOLD'),
      !n.flag&&h('text',{x:0,y:70,textAnchor:'middle',fontSize:9,fill:'#6f6f6f',fontFamily:'IBM Plex Sans,sans-serif'},n.lbl),
      n.flag&&h('text',{x:0,y:82,textAnchor:'middle',fontSize:8,fill:'#575757',fontFamily:'IBM Plex Mono,monospace'},'GUJARAT'),
    )),
    // inventory gauge panel
    h('g',{transform:'translate(430,10)'},
      h('rect',{x:0,y:0,width:120,height:130,rx:4,fill:'#1c1c1c',stroke:'#3d3d3d',strokeWidth:1}),
      h('text',{x:60,y:18,textAnchor:'middle',fontSize:9,fill:'#6f6f6f',fontFamily:'IBM Plex Mono,monospace'},'INVENTORY DAYS'),
      // gauge bar background
      h('rect',{x:18,y:28,width:84,height:16,rx:2,fill:'#323232'}),
      // gauge fill — 17/90 days ≈ 19%
      h('rect',{x:18,y:28,width:16,height:16,rx:2,fill:'#fa4d56'}),

// ═══════════════════════════════════════════════════
//  RADAR CHART (decision style profile)
// ═══════════════════════════════════════════════════
function RadarChart({counts}){
  const total=5;
  const cx=160,cy=140,r=100;
  // 4 axes: top=PatientFirst, right=Resilience, bottom=Efficiency, left=CostDriven
  const axes=[
    {key:'PATIENT_FIRST',lbl:'Patient First',ax:0,ay:-1},
    {key:'RESILIENCE',   lbl:'Resilience',   ax:1,ay:0},
    {key:'EFFICIENCY',   lbl:'Efficiency',   ax:0,ay:1},
    {key:'COST_DRIVEN',  lbl:'Cost Driven',  ax:-1,ay:0},
  ];
  const score=key=>Math.max(0.08,(counts[key]||0)/total);
  // grid diamonds
  const diamond=pct=>{
    const s=r*pct;
    return `${cx},${cy-s} ${cx+s},${cy} ${cx},${cy+s} ${cx-s},${cy}`;
  };
  // data polygon
  const dataPts=axes.map(a=>{const s=score(a.key)*r;return `${cx+a.ax*s},${cy+a.ay*s}`;}).join(' ');
  return h('svg',{viewBox:'0 0 340 290',width:'100%',style:{display:'block',maxWidth:340}},
    // grid
    [0.25,0.5,0.75,1].map((p,i)=>h('polygon',{key:i,points:diamond(p),fill:'none',stroke:'#3d3d3d',strokeWidth:p===1?1:0.7,strokeDasharray:p<1?'3 2':'none'})),
    // axis lines
    axes.map((a,i)=>h('line',{key:i,x1:cx,y1:cy,x2:cx+a.ax*r,y2:cy+a.ay*r,stroke:'#3d3d3d',strokeWidth:.8})),
    // data fill
    h('polygon',{points:dataPts,fill:'rgba(61,219,217,.15)',stroke:'#3ddbd9',strokeWidth:2}),
    // data points
    axes.map((a,i)=>{const s=score(a.key)*r;return h('circle',{key:i,cx:cx+a.ax*s,cy:cy+a.ay*s,r:4,fill:'#3ddbd9'});}),
    // axis labels
    axes.map((a,i)=>{
      const lx=cx+a.ax*(r+28);const ly=cy+a.ay*(r+22);
      const cnt=counts[a.key]||0;
      return h('g',{key:i},
        h('text',{x:lx,y:ly-5,textAnchor:'middle',fontSize:9,fill:'#3ddbd9',fontFamily:'IBM Plex Mono,monospace',fontWeight:600},a.lbl),
        h('text',{x:lx,y:ly+8,textAnchor:'middle',fontSize:9,fill:'#6f6f6f',fontFamily:'IBM Plex Mono,monospace'},`${cnt}/5 rounds`),
      );
    }),
    // center label
    h('text',{x:cx,y:cy+4,textAnchor:'middle',fontSize:9,fill:'#575757',fontFamily:'IBM Plex Mono,monospace'},'Decision'),
    h('text',{x:cx,y:cy+15,textAnchor:'middle',fontSize:9,fill:'#575757',fontFamily:'IBM Plex Mono,monospace'},'Profile'),
  );
}

    h('div',{style:{width:44,height:2,background:'#009d9a',marginBottom:40}}),
    h('h1',{style:{fontSize:'clamp(42px,7vw,70px)',fontWeight:300,lineHeight:1.01,letterSpacing:'-.018em',marginBottom:6}},
      'The ',h('span',{style:{fontWeight:600,color:'#3ddbd9'}},'Chain'),
    ),
    h('p',{style:{color:'#a8a8a8',fontSize:18,lineHeight:1.8,maxWidth:540,marginTop:28,marginBottom:12}},'A pharmaceutical supply chain simulation.'),
    h('p',{style:{color:'#6f6f6f',fontSize:14,lineHeight:1.9,maxWidth:480,marginBottom:20}},
      'The global pharmaceutical supply chain moves $1.3 trillion of medicines each year. It is built on concentration, long lead times, and zero tolerance for failure. ',
      h('strong',{style:{color:'#f4f4f4'}},'When it fails, patients suffer.'),' You are the Supply Chain Director at ',
      h('strong',{style:{color:'#f4f4f4'}},'Meridian Pharma'),'. Five crises. Five decisions. Each one irreversible.',
    ),
    h('div',{className:'flex flex-wrap gap-0.5 justify-center mb-14 mt-4'},
      ['12–15 min','5 crisis scenarios','MSc / MBA level','Pharmaceutical SCM'].map(t=>
        h('span',{key:t,style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f',background:'#262626',padding:'4px 12px',border:'1px solid #3d3d3d',letterSpacing:'.07em'}},t),
      ),
    ),
    h('button',{onClick:onStart,style:{background:'#009d9a',color:'#fff',border:'none',padding:'14px 56px',fontWeight:600,fontSize:15,letterSpacing:'.02em',transition:'background .15s'},
      onMouseEnter:e=>e.currentTarget.style.background='#007d79',onMouseLeave:e=>e.currentTarget.style.background='#009d9a'},
      'Enter the chain →',
    ),
  );
}

// ═══════════════════════════════════════════════════
//  NARRATIVE PHASE
// ═══════════════════════════════════════════════════
function NarrativePhase({onComplete}){
  const[step,setStep]=useState(0);
  const s=NARRATIVE[step];
  return h('div',{style:{flex:1,display:'flex',flexDirection:'column'}},
    h('div',{style:{padding:'12px 24px',borderBottom:'1px solid #3d3d3d',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,background:'#1c1c1c'}},
      h('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:11,color:'#6f6f6f',letterSpacing:'.1em',textTransform:'uppercase'}},'Supply Chain Overview'),
      h('div',{className:'flex gap-1.5 items-center'},
        NARRATIVE.map((_,i)=>h('div',{key:i,onClick:()=>setStep(i),style:{width:22,height:3,background:i<=step?'#009d9a':'#3d3d3d',cursor:'pointer',transition:'background .3s'}})),
      ),
    ),
    h('div',{style:{flex:1,display:'flex',flexDirection:'column',maxWidth:720,margin:'0 auto',width:'100%',padding:'24px 22px',overflowY:'auto'}},
      h('div',{style:{marginBottom:16}},h(ChainSVG,{hl:s.hl})),
      h('div',{key:step,className:'animate-fade-up',style:{flex:1,display:'flex',flexDirection:'column'}},
        h('h2',{style:{fontSize:'clamp(19px,3vw,29px)',fontWeight:600,lineHeight:1.2,marginBottom:12}},s.h),
        h('p',{style:{color:'#a8a8a8',fontSize:15,lineHeight:1.88,marginBottom:s.concept?20:26}},s.p),
        s.concept&&h('div',{style:{borderLeft:'3px solid #009d9a',padding:'10px 16px',background:'rgba(0,157,154,.08)',marginBottom:26}},
          h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:12,color:'#3ddbd9',lineHeight:1.6}},s.concept),
        ),
        h('div',{className:'flex justify-between items-center pt-4',style:{borderTop:'1px solid #3d3d3d',marginTop:'auto'}},
          h('button',{disabled:step===0,onClick:()=>setStep(s=>s-1),style:{background:'transparent',border:`1px solid ${step===0?'#3d3d3d':'#575757'}`,color:step===0?'#6f6f6f':'#a8a8a8',padding:'10px 22px',fontSize:13,cursor:step===0?'default':'pointer'}},'← Back'),
          step<NARRATIVE.length-1
            ?h('button',{onClick:()=>setStep(s=>s+1),style:{background:'#0f62fe',color:'#fff',border:'none',padding:'12px 28px',fontWeight:600,fontSize:13}},'Next →')
            :h('button',{onClick:onComplete,style:{background:'#009d9a',color:'#fff',border:'none',padding:'12px 28px',fontWeight:600,fontSize:13}},'Enter Simulation →'),
        ),
      ),
    ),
  );
}

// ═══════════════════════════════════════════════════
//  PLAYING
// ═══════════════════════════════════════════════════
function ChoiceBtn({ch,onClick}){
  const[hov,setHov]=useState(false);
  return h('button',{onClick,onMouseEnter:()=>setHov(true),onMouseLeave:()=>setHov(false),
    style:{display:'block',width:'100%',textAlign:'left',background:hov?'rgba(0,157,154,.10)':'#262626',border:`1px solid ${hov?'#009d9a':'#3d3d3d'}`,padding:'15px 18px',marginBottom:8,cursor:'pointer',transition:'border-color .12s,background .12s'}},
    h('div',{className:'flex gap-3'},
      h('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:'#009d9a',fontWeight:600,flexShrink:0,width:18,paddingTop:1}},ch.id),
      h('div',{style:{flex:1}},
        h('p',{style:{fontWeight:600,fontSize:14,color:'#f4f4f4',marginBottom:5}},ch.label),
        h('p',{style:{color:'#a8a8a8',fontSize:13,lineHeight:1.72,marginBottom:7}},ch.description),
        h('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#fa4d56',letterSpacing:'.07em'}},'TRADE-OFF '),
        h('span',{style:{color:'#6f6f6f',fontSize:12}},ch.tradeoff),
      ),
    ),
  );
}

function Playing({onComplete}){
  const[round,setRound]=useState(0);
  const[phase,setPhase]=useState('scene');
  const[picked,setPicked]=useState(null);
  const[metrics,setMetrics]=useState(INITIAL);
  const[prevM,setPrevM]=useState(null);
  const[history,setHistory]=useState([]);
  const rdata=ROUNDS[round];
  const Diag=DIAGRAMS[round];

  const pick=ch=>{
    setPicked(ch);setPrevM(metrics);
    setMetrics(m=>({inventory:clamp(m.inventory+(ch.deltas?.inventory||0)),resilience:clamp(m.resilience+(ch.deltas?.resilience||0)),demand:clamp(m.demand+(ch.deltas?.demand||0)),reputation:clamp(m.reputation+(ch.deltas?.reputation||0))}));
    setHistory(h=>[...h,{round:round+1,label:ch.label,tag:ch.tag,concept:ch.concept}]);
    setPhase('result');
  };
  const next=()=>{
    if(round>=4){onComplete([...history],{inventory:clamp(metrics.inventory),resilience:clamp(metrics.resilience),demand:clamp(metrics.demand),reputation:clamp(metrics.reputation)});}
    else{setRound(r=>r+1);setPicked(null);setPhase('scene');setPrevM(null);}
  };

  return h('div',{className:'game-layout flex flex-1',style:{minHeight:0}},
    // ── Sidebar ──
    h('div',{style:{width:205,flexShrink:0,borderRight:'1px solid #3d3d3d',padding:'20px 16px',overflowY:'auto',background:'#1c1c1c',display:'flex',flexDirection:'column'}},
      h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:18}},'System State'),
      Object.entries(metrics).map(([k,v])=>h(Metric,{key:k,label:MLABELS[k],value:v,delta:prevM?v-prevM[k]:null})),
      h('div',{style:{marginTop:24,paddingTop:18,borderTop:'1px solid #3d3d3d'}},
        h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f',letterSpacing:'.1em',marginBottom:4}},'WEEK'),
        h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:36,fontWeight:600,lineHeight:1,color:'#f4f4f4'}},
          round+1,h('span',{style:{fontSize:15,color:'#6f6f6f',fontWeight:400}},'/5'),
        ),
        h('div',{className:'flex gap-0.5 mt-2'},
          Array.from({length:5},(_,i)=>h('div',{key:i,style:{flex:1,height:3,background:i<round?'#009d9a':i===round?'#3ddbd9':'#3d3d3d',transition:'background .3s'}})),
        ),
        h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:9,color:'#6f6f6f',marginTop:8,lineHeight:1.5}},rdata.tag),
      ),
    ),
    // ── Main ──
    h('div',{style:{flex:1,overflowY:'auto',padding:'22px 26px',maxWidth:880}},
      phase==='scene'&&h('div',{key:`sc${round}`,className:'animate-fade-up'},
        h('div',{className:'flex items-center gap-2 mb-4'},
          h('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#fa4d56',background:'rgba(218,30,40,.18)',padding:'3px 10px',border:'1px solid rgba(218,30,40,.4)',letterSpacing:'.1em'}},'⚠ SITUATION BRIEFING'),
          h('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f'}},`Week ${round+1} · Monday 08:45`),
        ),
        h('p',{style:{fontSize:15,lineHeight:1.9,marginBottom:16,color:'#f4f4f4'}},rdata.situation),
        // ── Round Diagram ──
        h('div',{style:{background:'#1c1c1c',border:'1px solid #3d3d3d',padding:'16px 14px',marginBottom:18,borderRadius:2}},
          h(Diag),
        ),
        h('div',{style:{borderLeft:'3px solid #f1c21b',background:'rgba(241,194,27,.08)',padding:'11px 15px',marginBottom:22}},
          h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#fddc69',letterSpacing:'.1em',marginBottom:4}},'STAKES'),
          h('p',{style:{color:'#a8a8a8',fontSize:13,lineHeight:1.7}},rdata.stakes),
        ),
        h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:11}},'Your options'),
        rdata.choices.map(ch=>h(ChoiceBtn,{key:ch.id,ch,onClick:()=>pick(ch)})),
      ),
      phase==='result'&&picked&&h('div',{key:`rs${round}`,className:'animate-fade-up'},
        h('div',{className:'flex items-center gap-2 mb-4'},
          h('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#42be65',background:'rgba(36,161,72,.18)',padding:'3px 10px',border:'1px solid rgba(36,161,72,.4)',letterSpacing:'.1em'}},'✓ DECISION RECORDED'),
          h('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f'}},picked.label),
        ),
        h('p',{style:{fontSize:15,lineHeight:1.9,marginBottom:20,color:'#f4f4f4'}},picked.consequence),
        h('div',{style:{background:'#1c1c1c',border:'1px solid #3d3d3d',padding:'16px 18px',marginBottom:22}},
          h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#3ddbd9',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:7}},'SCM Concept'),
          h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:12,color:'#f4f4f4',marginBottom:5}},picked.concept.term),
          h('p',{style:{color:'#a8a8a8',fontSize:13,lineHeight:1.8}},picked.concept.note),
        ),
        h('div',{className:'flex justify-end'},
          h('button',{onClick:next,style:{background:round>=4?'#009d9a':'#0f62fe',color:'#fff',border:'none',padding:'13px 34px',fontWeight:600,fontSize:14,cursor:'pointer'},onMouseEnter:e=>e.currentTarget.style.opacity='.82',onMouseLeave:e=>e.currentTarget.style.opacity='1'},round>=4?'View Your Profile →':'Next Situation →'),
        ),
      ),
    ),
  );
}

// ═══════════════════════════════════════════════════
//  PROFILE
// ═══════════════════════════════════════════════════
function Profile({history,metrics,onRestart}){
  const profile=deriveProfile(history,metrics);
  return h('div',{style:{flex:1,overflowY:'auto'}},
    h('div',{className:'animate-fade-up',style:{maxWidth:860,margin:'0 auto',padding:'32px 22px'}},
      h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:10}},'Final System State'),
      h('div',{className:'flex flex-wrap gap-0.5 mb-10'},
        Object.entries(metrics).map(([k,v])=>{
          const vv=clamp(v);const col=vv>60?'#42be65':vv>35?'#f1c21b':'#fa4d56';
          return h('div',{key:k,style:{background:'#1c1c1c',border:'1px solid #3d3d3d',padding:'12px 14px',flex:'1 1 100px'}},
            h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:9,color:'#6f6f6f',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:6}},MLABELS[k]),
            h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:28,color:col,fontWeight:600,lineHeight:1}},vv),
          );
        }),
      ),
      // Profile header
      h('div',{style:{marginBottom:28,paddingBottom:28,borderBottom:'1px solid #3d3d3d'}},
        h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:12}},'Your Decision Profile'),
        h('h2',{style:{fontSize:'clamp(26px,5vw,48px)',fontWeight:300,color:'#3ddbd9',lineHeight:1.06,marginBottom:14}},profile.archetype),
        h('p',{style:{color:'#a8a8a8',fontSize:15,lineHeight:1.85}},profile.summary),
      ),
      // Radar + stats side by side
      h('div',{className:'flex flex-wrap gap-8 mb-10 items-start'},
        h('div',{style:{flex:'0 0 auto'}},
          h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:10}},'Decision Radar'),
          h(RadarChart,{counts:profile.counts}),
        ),
        h('div',{style:{flex:'1 1 240px'}},
          h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#42be65',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:12}},'Strengths'),
          profile.strengths.map((s,i)=>h('div',{key:i,className:'flex gap-2.5 mb-3'},
            h('span',{style:{color:'#42be65',flexShrink:0}},'✓'),
            h('p',{style:{color:'#a8a8a8',fontSize:13,lineHeight:1.7}},s),
          )),
          h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#fddc69',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:12,marginTop:20}},'Areas to Explore'),
          profile.blindspots.map((b,i)=>h('div',{key:i,className:'flex gap-2.5 mb-3'},
            h('span',{style:{color:'#fddc69',flexShrink:0}},'△'),
            h('p',{style:{color:'#a8a8a8',fontSize:13,lineHeight:1.7}},b),
          )),
        ),
      ),
      // SCM Concepts
      h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:12}},'Key Concepts Encountered'),
      h('div',{style:{marginBottom:28}},
        profile.concepts.map((c,i)=>h('div',{key:i,style:{background:'#1c1c1c',border:'1px solid #3d3d3d',padding:'13px 16px',marginBottom:5}},
          h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:12,color:'#3ddbd9',marginBottom:4}},c.term),
          h('p',{style:{color:'#a8a8a8',fontSize:13,lineHeight:1.75}},c.note),
        )),
      ),
      // Reflection
      h('div',{style:{background:'rgba(15,98,254,.1)',border:'1px solid rgba(15,98,254,.35)',padding:'20px 24px',marginBottom:28}},
        h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#78a9ff',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:10}},'For Reflection'),
        h('p',{style:{fontSize:15,lineHeight:1.9,fontStyle:'italic',color:'#f4f4f4'}},`"${profile.reflection}"`),
      ),
      // Decision log
      h('p',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:12}},'Decision Log'),
      history.map((d,i)=>h('div',{key:i,className:'flex gap-3 items-start pb-2.5 mb-2.5',style:{borderBottom:'1px solid #3d3d3d'}},
        h('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'#6f6f6f',width:22,flexShrink:0,paddingTop:2}},`R${d.round}`),
        h('div',null,
          h('p',{style:{color:'#f4f4f4',fontSize:13,marginBottom:2}},d.label),
          h('p',{style:{color:'#6f6f6f',fontSize:11,fontFamily:'IBM Plex Mono,monospace'}},d.tag),
        ),
      )),
      h('div',{className:'flex justify-center mt-8 gap-3 flex-wrap'},
        h('button',{onClick:onRestart,style:{background:'transparent',border:'1px solid #3ddbd9',color:'#3ddbd9',padding:'12px 36px',fontWeight:500,fontSize:14,cursor:'pointer'},onMouseEnter:e=>e.currentTarget.style.background='rgba(61,219,217,.1)',onMouseLeave:e=>e.currentTarget.style.background='transparent'},'↺ Play Again — Different Choices'),
      ),
    ),
  );
}

// ═══════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════
function App(){
  const[phase,setPhase]=useState('splash');
  const[round,setRound]=useState(0);
  const[histData,setHistData]=useState([]);
  const[metData,setMetData]=useState({});
  const restart=()=>{setPhase('splash');setHistData([]);setMetData({});setRound(0);};

  let content;
  if(phase==='splash')    content=h(Splash,{onStart:()=>setPhase('narrative')});
  else if(phase==='narrative') content=h(NarrativePhase,{onComplete:()=>setPhase('playing')});
  else if(phase==='playing')   content=h(Playing,{onComplete:(hi,me)=>{setHistData(hi);setMetData(me);setPhase('profile');}});
  else content=h(Profile,{history:histData,metrics:metData,onRestart:restart});

  return h(OsShell,{round,phase},content);
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
